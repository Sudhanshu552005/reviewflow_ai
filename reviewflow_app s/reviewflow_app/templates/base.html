<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewFlow AI Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between antialiased selection:bg-purple-500 selection:text-white">

    <nav class="bg-white border-b border-purple-100 sticky top-0 z-50 shadow-xs px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 bg-purple-600 rounded-xl flex items-center justify-center text-white font-extrabold shadow-sm shadow-purple-500/30">R</div>
                <div>
                    <span class="text-md font-extrabold tracking-tight text-slate-900">ReviewFlow</span>
                    <span class="text-xs font-bold text-purple-600 bg-purple-50 px-2 py-0.5 rounded-md ml-1.5 border border-purple-100">AI</span>
                </div>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 bg-slate-100 px-3 py-1 rounded-full">Digital Byte Solutions</span>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-10 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-purple-50 py-4 text-center text-[10px] text-slate-400 uppercase tracking-widest font-semibold">
        CORPORATE REPUTATION INFRASTRUCTURE LAYER • POWERED BY DIGITAL BYTE SOLUTIONS
    </footer>

</body>
</html>
